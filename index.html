<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turpial Airlines - e-Commerce y Soporte</title>

    <!-- Estilos Originales (Chatbot) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Nuevos Estilos Turpial -->
    <link rel="stylesheet" href="turpial.css">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Main Content Placeholder to simulate a real website -->
    <div class="site-content">
        <header class="turpial-header">
            <nav class="turpial-nav">
                <div class="logo">Turpial<span>Airlines</span> <i class="fa-solid fa-plane-departure" style="font-size:1.4rem; color:var(--turpial-yellow);"></i></div>
                <div class="nav-actions">
                    <button class="nav-btn" id="open-favorites-btn">
                        <i class="fa-solid fa-heart"></i>
                        <span id="fav-count" class="badge">0</span>
                    </button>
                    <button class="nav-btn" id="open-cart-btn">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cart-count" class="badge">0</span>
                    </button>
                </div>
            </nav>
        </header>

        <!-- Nueva Sección Turpial -->
        <section class="turpial-hero">
            <div class="hero-content">
                <h1 class="hero-title">Vuela con <span>Orgullo Venezolano</span></h1>
                <p style="font-size: 1.25rem; margin-top: 10px; font-weight: 600;">Descubre el mundo con el mejor servicio y la calidez que nos caracteriza.</p>
                <div class="venezuela-stars">
                    <!-- 8 Estrellas de la Bandera -->
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                </div>
            </div>
        </section>

        <!-- Lista de Vuelos Dinámica -->
        <main>
            <div class="section-title">
                <h2>Vuelos Destacados</h2>
                <p>Encuentra tu próximo destino al mejor precio garantizado.</p>
            </div>
            
            <div id="flights-container" class="flights-grid">
                <!-- Los vuelos serán inyectados por turpial.js -->
            </div>
        </main>
    </div>

    <!-- Modales y Elementos Flotantes -->
    <!-- Sidebar del Carrito -->
    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-bag-shopping"></i> Tu Carrito</h2>
            <button class="close-sidebar" id="close-cart-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content" id="cart-items">
            <!-- Items inyectados via JS -->
        </div>
        <div class="sidebar-footer">
            <div class="cart-total">Total: <span id="cart-total-price">$0</span></div>
            <div class="cart-actions">
                <button class="btn btn-outline" id="empty-cart-btn">Vaciar Carrito</button>
                <button class="btn btn-primary" id="checkout-btn">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <!-- Sidebar de Favoritos -->
    <div id="favorites-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-heart"></i> Guardados</h2>
            <button class="close-sidebar" id="close-favorites-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content" id="favorites-items">
            <!-- Items inyectados via JS -->
        </div>
    </div>

    <!-- Overlay oscuro para sidebars -->
    <div id="sidebar-overlay" class="overlay"></div>

    <!-- Chatbot Widget -->
    <div id="chat-widget" class="chat-widget">
        <!-- Chat Toggle Button -->
        <button id="chat-toggle" class="chat-toggle" aria-label="Open support chat">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L2 22l5-1.338c1.47.851 3.179 1.338 5 1.338 5.523 0 10-4.477 10-10S17.523 2 12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/>
            </svg>
        </button>

        <!-- Chat Window -->
        <div id="chat-window" class="chat-window hidden">
            <div class="chat-header">
                <div class="header-info">
                    <img src="https://ui-avatars.com/api/?name=Avior+Support&background=D71920&color=fff&bold=true" alt="Avatar" class="bot-avatar">
                    <div class="bot-details">
                        <span class="bot-name">Avior Assistant</span>
                        <span class="bot-status">Online</span>
                    </div>
                </div>
                <button id="close-chat" class="close-chat">&times;</button>
            </div>
            
            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be injected here -->
            </div>

            <div id="typing-indicator" class="typing-indicator hidden">
                <span></span><span></span><span></span>
            </div>

            <div class="chat-suggestions" id="chat-suggestions">
                <!-- Suggestions will be injected here -->
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-message">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="turpial.js"></script>
</body>
</html>
